<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSB Leaderboard Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:#2E72B8;--blue-dk:#1D3557;--orange:#E8941A;
    --gold:#B8962E;--silver:#7A8FA0;--bronze:#A0714A;
    --cream:#F7F4EE;--white:#fff;--bdr:#E8E2D6;
    --ink:#1D3557;--ink2:#6B6460;--ink3:#8A8278;
    --green:#2E8B57;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;background:var(--cream);font-family:'Instrument Sans',system-ui,sans-serif;color:var(--ink);}

  .header{background:linear-gradient(135deg,#1D3557,#264B73,#2E72B8);padding:22px 20px 18px;border-bottom:3px solid var(--orange);}
  .header-in{max-width:920px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
  .header-label{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--orange);margin-bottom:3px;}
  .header h1{font-size:20px;font-weight:700;color:#fff;}
  .btn{border:none;border-radius:7px;padding:7px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .2s;}
  .btn-ghost{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;}
  .btn-orange{background:var(--orange);color:#fff;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  .container{max-width:920px;margin:0 auto;padding:18px 14px 50px;}

  .month-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:18px;}
  .month-btn{width:32px;height:32px;border-radius:50%;border:1px solid #D4CFC4;background:var(--white);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);font-weight:700;}
  .month-btn:disabled{background:#EDEBE6;color:#B0A89A;cursor:not-allowed;}
  .month-label{font-size:19px;font-weight:700;color:var(--ink);text-align:center;min-width:160px;}
  .live-badge{display:inline-flex;align-items:center;gap:4px;margin-top:2px;font-size:9px;font-weight:700;color:var(--green);background:#E8F5E9;padding:2px 7px;border-radius:20px;}
  .live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block;}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;}
  .stat{background:var(--white);border-radius:10px;padding:14px 10px;text-align:center;border:1px solid var(--bdr);}
  .stat-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:3px;}
  .stat-val{font-size:20px;font-weight:700;}

  .table-wrap{background:var(--white);border-radius:14px;border:1px solid var(--bdr);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);}
  .thead{display:grid;grid-template-columns:44px 1fr 70px 110px 82px;padding:9px 14px;background:var(--blue-dk);gap:6px;}
  .thead span{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.6);}
  .thead span:nth-child(n+3){text-align:right;}

  .trow{display:grid;grid-template-columns:44px 1fr 70px 110px 82px;padding:11px 14px;gap:6px;align-items:center;border-bottom:1px solid #F0ECE4;cursor:pointer;transition:background .15s;}
  .trow:hover{background:#FAFAF6;}
  .trow.top3{background:rgba(184,150,46,.03);}

  .rank{font-weight:700;text-align:center;}
  .customer{display:flex;align-items:center;gap:8px;overflow:hidden;}
  .avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
  .cname{font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .corder{font-size:10px;color:var(--ink3);}
  .orders-col,.spend-col{font-size:12px;font-weight:600;text-align:right;color:var(--ink);}
  .spend-col{font-weight:700;}
  .reward{text-align:right;}
  .reward-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;display:inline-block;}

  .expanded{padding:8px 14px 12px 60px;background:#FAFAF6;border-bottom:1px solid #F0ECE4;font-size:11px;color:var(--ink2);display:flex;gap:20px;flex-wrap:wrap;}
  .expanded b{color:var(--ink);}

  .loading{text-align:center;padding:40px;color:var(--ink3);}
  .spinner{width:26px;height:26px;border:3px solid var(--bdr);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 8px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .error{background:#FFF5F5;border:1px solid #FCC;border-radius:10px;padding:14px 18px;margin-bottom:14px;text-align:center;font-size:12px;color:#C53030;}
  .empty{background:var(--white);border-radius:14px;border:1px solid var(--bdr);padding:40px;text-align:center;}
  .footer{text-align:center;margin-top:12px;font-size:10px;color:#A09A90;}

  @media(max-width:640px){
    .stats{grid-template-columns:1fr;}
    .thead,.trow{grid-template-columns:36px 1fr 50px 80px;}
    .thead span:last-child,.reward{display:none;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-in">
    <div>
      <div class="header-label">MySmartBazaar</div>
      <h1>Leaderboard Admin</h1>
    </div>
    <div style="display:flex;gap:6px;">
      <button class="btn btn-ghost" id="refreshBtn" onclick="fetchData()">↻ Refresh</button>
      <button class="btn btn-orange" id="csvBtn" onclick="exportCSV()" disabled>↓ CSV</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="month-nav">
    <button class="month-btn" id="prevBtn" onclick="prevMonth()">←</button>
    <div>
      <div class="month-label" id="monthLabel"></div>
      <div id="liveBadge" style="text-align:center;display:none;">
        <span class="live-badge"><span class="live-dot"></span> Live</span>
      </div>
    </div>
    <button class="month-btn" id="nextBtn" onclick="nextMonth()">→</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Unique Buyers</div><div class="stat-val" id="statBuyers" style="color:var(--blue)">0</div></div>
    <div class="stat"><div class="stat-label">Total Orders</div><div class="stat-val" id="statOrders" style="color:var(--orange)">0</div></div>
    <div class="stat"><div class="stat-label">Revenue</div><div class="stat-val" id="statRevenue" style="color:var(--green)">₹0</div></div>
  </div>

  <div id="content"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const COLORS = ["#D4A017","#6B8E9B","#A0714A","#2E72B8","#C47810","#5A7D5A","#8B6F8B","#B85C2E","#4A7A8B","#7A5C3A"];
const RC = {1:"#B8962E",2:"#7A8FA0",3:"#A0714A"};
const MEDALS = {1:"🥇",2:"🥈",3:"🥉"};
const TAGS = {1:"Gold",2:"Silver",3:"Bronze"};
const TAGBG = {1:"#FDFAF0",2:"#F2F5F8",3:"#FBF4EE"};

const now = new Date();
let selMonth = now.getMonth();
let selYear = now.getFullYear();
let currentData = null;
let expandedIdx = null;

function fmt(n){return new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n);}
function ini(name){if(!name)return"??";const p=name.trim().split(/\s+/);return p.length===1?p[0].substring(0,2).toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase();}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function isCurrent(){return selMonth===now.getMonth()&&selYear===now.getFullYear();}

function updateNav(){
  document.getElementById("monthLabel").textContent=MONTHS[selMonth]+" "+selYear;
  document.getElementById("liveBadge").style.display=isCurrent()?"block":"none";
  document.getElementById("nextBtn").disabled=isCurrent();
}

function prevMonth(){
  if(selMonth===0){selMonth=11;selYear--;}else selMonth--;
  updateNav();fetchData();
}
function nextMonth(){
  if(isCurrent())return;
  if(selMonth===11){selMonth=0;selYear++;}else selMonth++;
  updateNav();fetchData();
}

async function fetchData(){
  const content=document.getElementById("content");
  const refreshBtn=document.getElementById("refreshBtn");
  refreshBtn.textContent="...";
  expandedIdx=null;

  content.innerHTML='<div class="loading"><div class="spinner"></div><div>Loading '+MONTHS[selMonth]+'...</div></div>';

  const start=new Date(Date.UTC(selYear,selMonth,1)).toISOString();
  const end=new Date(Date.UTC(selYear,selMonth+1,0,23,59,59)).toISOString();

  try{
    const res=await fetch("/api/leaderboard-proxy?created_at_min="+encodeURIComponent(start)+"&created_at_max="+encodeURIComponent(end));
    if(!res.ok)throw new Error("Error "+res.status);
    currentData=await res.json();
    renderData();
  }catch(e){
    content.innerHTML='<div class="error">⚠️ '+esc(e.message)+'</div>';
    currentData=null;
  }finally{
    refreshBtn.textContent="↻ Refresh";
    document.getElementById("csvBtn").disabled=!currentData?.leaderboard?.length;
  }
}

function renderData(){
  const top10=currentData?.leaderboard?.slice(0,10)||[];
  const meta=currentData?.meta||{};
  const content=document.getElementById("content");

  document.getElementById("statBuyers").textContent=(meta.uniqueCustomers||0).toLocaleString();
  document.getElementById("statOrders").textContent=(meta.qualifiedOrders||0).toLocaleString();
  document.getElementById("statRevenue").textContent=fmt(top10.reduce(function(s,c){return s+(c.totalSpend||0);},0));

  if(!top10.length){
    content.innerHTML='<div class="empty"><div style="font-size:32px;margin-bottom:8px">📊</div><div style="font-size:13px;color:#6B6460">No orders for '+MONTHS[selMonth]+' '+selYear+'</div></div>';
    return;
  }

  let html='<div class="table-wrap"><div class="thead"><span>Rank</span><span>Customer</span><span>Orders</span><span>Spend</span><span>Reward</span></div>';

  top10.forEach(function(c,i){
    const rank=i+1;
    const medal=MEDALS[rank]||"";
    const color=RC[rank]||"#8A8278";
    const isTop=rank<=3;

    html+='<div class="trow'+(isTop?' top3':'')+'" onclick="toggleRow('+i+')" style="'+(isTop?'background:'+color+'08':'')+'">';
    html+='<div class="rank" style="font-size:'+(medal?'17':'12')+'px;color:'+color+'">'+(medal||rank)+'</div>';
    html+='<div class="customer"><div class="avatar" style="background:'+COLORS[i%10]+'">'+ini(c.name)+'</div><div style="overflow:hidden"><div class="cname">'+esc(c.name)+'</div><div class="corder">#'+(c.lastOrderNum||"—")+'</div></div></div>';
    html+='<div class="orders-col">'+c.orderCount+'</div>';
    html+='<div class="spend-col" style="color:'+(rank===1?"#B8962E":"var(--ink)")+'">'+fmt(c.totalSpend)+'</div>';
    if(rank<=3){
      html+='<div class="reward"><span class="reward-tag" style="background:'+TAGBG[rank]+';color:'+color+'">'+medal+' '+TAGS[rank]+'</span></div>';
    }else{
      html+='<div class="reward"><span style="font-size:10px;color:#C4BEB4">—</span></div>';
    }
    html+='</div>';
    html+='<div class="expanded" id="row-'+i+'" style="display:none"><div><b>Email:</b> '+(c.email||"N/A")+'</div><div><b>ID:</b> '+c.customerId+'</div><div><b>Avg Order:</b> '+fmt(c.totalSpend/c.orderCount)+'</div></div>';
  });

  html+='</div>';
  content.innerHTML=html;

  if(currentData.meta?.generatedAt){
    document.getElementById("footer").textContent=new Date(currentData.meta.generatedAt).toLocaleString("en-IN",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})+" · Cached 5 min";
  }
}

function toggleRow(idx){
  if(expandedIdx!==null&&expandedIdx!==idx){
    const prev=document.getElementById("row-"+expandedIdx);
    if(prev)prev.style.display="none";
  }
  const el=document.getElementById("row-"+idx);
  if(!el)return;
  if(expandedIdx===idx){el.style.display="none";expandedIdx=null;}
  else{el.style.display="flex";expandedIdx=idx;}
}

function exportCSV(){
  const top10=currentData?.leaderboard?.slice(0,10)||[];
  if(!top10.length)return;
  const rows=["Rank,Name,Email,Orders,Total Spend,Last Order"];
  top10.forEach(function(c,i){
    rows.push((i+1)+',"'+c.name+'","'+(c.email||"")+'",'+c.orderCount+','+c.totalSpend+','+(c.lastOrderNum||""));
  });
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([rows.join("\n")],{type:"text/csv"}));
  a.download="leaderboard-"+MONTHS[selMonth]+"-"+selYear+".csv";
  a.click();
}

updateNav();
fetchData();
</script>
</body>
</html>
